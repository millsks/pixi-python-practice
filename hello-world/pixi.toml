[workspace]
name = "hello-world"
channels = ["conda-forge"]
platforms = ["linux-64", "osx-arm64", "osx-64", "win-64"]
preview = ["pixi-build"]
requires-pixi = ">=0.65"

[dependencies]
python = ">=3.11"
fastapi = ">=0.100"
uvicorn = ">=0.23"

[tasks]
start = { cmd = "uvicorn hello_world.main:app --host 0.0.0.0 --port 8000 --reload", description = "Start the FastAPI development server" }

[package]
name = "hello-world"
version = "0.1.0"

[package.build]
backend = { name = "pixi-build-python", version = "*" }

[package.host-dependencies]
hatchling = "*"

[package.run-dependencies]
python = ">=3.11"
fastapi = ">=0.100"
uvicorn = ">=0.23"
